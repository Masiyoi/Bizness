<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Shield body -->
  <path d="M50 8 L88 22 L88 52 C88 72 70 88 50 95 C30 88 12 72 12 52 L12 22 Z"
        fill="#1B2B5E" stroke="#C9956A" stroke-width="2.5"/>

  <!-- Inner shield border -->
  <path d="M50 14 L82 26 L82 52 C82 69 66 83 50 89 C34 83 18 69 18 52 L18 26 Z"
        fill="none" stroke="#C9956A" stroke-width="1.2" opacity="0.6"/>

  <!-- Letter L -->
  <text x="31" y="68" font-family="Georgia, serif" font-size="42" font-weight="bold"
        fill="white" letter-spacing="-1">L</text>

  <!-- Checkmark / slash accent over L -->
  <line x1="45" y1="58" x2="62" y2="38" stroke="#C9956A" stroke-width="3.5" stroke-linecap="round"/>
  <polyline points="54,68 60,62 68,72" fill="none" stroke="#C9956A" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Crown -->
  <!-- Crown base band -->
  <rect x="28" y="4" width="44" height="7" rx="3" fill="#C9956A"/>
  <!-- Crown points -->
  <polygon points="28,11 35,0 40,8 50,0 60,8 65,0 72,11" fill="#C9956A"/>
  <!-- Crown gems -->
  <circle cx="35" cy="7" r="1.5" fill="white" opacity="0.8"/>
  <circle cx="50" cy="7" r="1.5" fill="white" opacity="0.8"/>
  <circle cx="65" cy="7" r="1.5" fill="white" opacity="0.8"/>

  <!-- Stars on sides -->
  <text x="4" y="58" font-size="10" fill="#C9956A" opacity="0.9">★</text>
  <text x="83" y="58" font-size="10" fill="#C9956A" opacity="0.9">★</text>
</svg>
